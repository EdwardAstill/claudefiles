# claudefiles manifest
# Declares per-skill tool requirements and bin entries for install.sh

[bin]
# Scripts in bin/ to symlink to ~/.local/bin/
install = ["cf-worktree", "cf-status", "cf-context", "cf-versions", "cf-routes", "cf-note", "cf-init", "cf-read", "cf-agents", "cf-setup", "cf-check"]

[skills.using-claudefiles]
tools = []

[skills.brainstorming]
tools = ["Read", "Write", "Glob", "Agent"]

[skills.writing-plans]
tools = ["Read", "Write"]

[skills.subagent-driven-development]
tools = ["Read", "Agent"]

[skills.skill-manager]
tools = ["Bash", "Read"]

[skills.writing-skills]
tools = ["Read", "Write", "Agent"]

[skills.tdd]
tools = ["Bash", "Read", "Write"]

[skills.systematic-debugging]
tools = ["Bash", "Read", "Grep"]

[skills.verification-before-completion]
tools = ["Bash", "Read"]

[skills.code-review]
tools = ["Bash", "Read", "Agent"]

[skills.simplify]
tools = ["Read", "Write", "Bash"]

[skills.git-worktree-workflow]
tools = ["Bash"]

[skills.executor]
tools = ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Agent", "WebSearch", "WebFetch"]

[skills.manager]
tools = ["Bash", "Read", "Agent"]

[skills.design-advisor]
tools = []

[skills.git-advisor]
tools = []

[skills.coordination-advisor]
tools = []

[skills.github-actions-expert]
tools = ["Bash", "Read", "Glob"]

[skills.codebase-explainer]
tools = ["Bash", "Read", "Glob", "Grep"]

[skills.note-taker]
tools = ["Bash", "Read", "Write"]

[skills.test-taker]
tools = ["Bash", "Read", "Write"]


[skills.git-expert]
tools = ["Bash", "Read", "Glob"]

[skills.api-architect]
tools = ["Bash", "Read", "Grep", "Glob"]
# LSP tools (typescript-lsp, rust-analyzer-lsp) assumed installed via plugins

[skills.docs-agent]
tools = ["WebSearch", "WebFetch"]
mcp = ["context7"]
cli = ["qmd"]

[skills.research-agent]
tools = ["WebSearch", "WebFetch", "Read"]
cli = ["qmd"]

[skills.python-expert]
tools = ["LSP", "Bash", "Read"]
cli = ["pyright"]

[skills.typescript-expert]
tools = ["LSP", "Bash", "Read"]
cli = ["typescript-language-server"]

[skills.rust-expert]
tools = ["LSP", "Bash", "Read"]
cli = ["rust-analyzer"]

[skills.typst-expert]
tools = ["LSP", "Bash", "Read"]
cli = ["tinymist"]

# ── CLI tool registry ─────────────────────────────────────────────────────────
# Tools installed via bun, uv, cargo, or rustup.
# cf-agents checks PATH for each and flags missing ones.
# Use 'install' to override the default install command.

[cli.qmd]
manager = "bun"
package = "@tobilu/qmd"
description = "Local markdown search — BM25 + vector + LLM reranking, fully local"

[cli.pyright]
manager = "bun"
package = "pyright"
description = "Python type checker and language server"

[cli.typescript-language-server]
manager = "bun"
package = "typescript-language-server"
install = "bun install -g typescript typescript-language-server"
description = "TypeScript/JavaScript language server"

[cli.rust-analyzer]
manager = "rustup"
package = "rust-analyzer"
install = "rustup component add rust-analyzer"
description = "Rust language server"

[cli.tinymist]
manager = "cargo"
package = "tinymist"
install = "cargo install tinymist"
description = "Typst language server"
