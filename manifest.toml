# ── CLI tool registry ─────────────────────────────────────────────────────────
# Tools installed via bun, uv, cargo, or rustup.
# af-agents checks PATH for each and flags missing ones.
# Use 'install' to override the default install command.

[cli.af]
manager = "uv"
package = "af"
install = "uv tool install -e ~/projects/agentfiles/tools/python/"
description = "agentfiles CLI — context, status, install, archetype, ak, audit, skill-usage, learn"

[cli.uv]
manager = "system"
package = "uv"
install = ["curl -LsSf https://astral.sh/uv/install.sh | sh"]
description = "Python package / tool manager used throughout agentfiles"

[cli.curl]
manager = "system"
package = "curl"
install = ["pacman -S curl", "apt install curl", "brew install curl"]
description = "HTTP client used by web-scraper and various bootstrap flows"

[cli.repomix]
manager = "bun"
package = "repomix"
install = "bun install -g repomix"
description = "Pack repo into single AI-friendly file — --compress cuts ~70% tokens via Tree-sitter, --remote for GitHub repos"

[cli.rr]
manager = "bun"
package = "readrun"
install = "bun install -g github:EdwardAstill/readrun"
description = "Render folders of Markdown as interactive sites with runnable Python (Pyodide) and auto-mounting JSX/React components"

[cli.mks]
manager = "cargo"
package = "markstore"
install = ["cargo install --path ~/projects/markstore", "cargo install --git https://github.com/EdwardAstill/markstore"]
description = "Local markdown store — BM25 full-text search, semantic vector search, knowledge graph"

[cli.cnv]
manager = "cargo"
package = "convert2"
install = ["cargo install --path ~/projects/convert2", "cargo install --git https://github.com/EdwardAstill/convert2"]
description = "PDF to AI-friendly markdown, RAG, and Knowledge Graph converter"

[cli.pyright]
manager = "bun"
package = "pyright"
description = "Python type checker and language server"

[cli.typescript-language-server]
manager = "bun"
package = "typescript-language-server"
install = "bun install -g typescript typescript-language-server"
description = "TypeScript/JavaScript language server"

[cli.rust-analyzer]
manager = "rustup"
package = "rust-analyzer"
install = "rustup component add rust-analyzer"
description = "Rust language server"

[cli.tinymist]
manager = "cargo"
package = "tinymist"
install = ["curl --proto '=https' --tlsv1.2 -LsSf https://github.com/Myriad-Dreamin/tinymist/releases/latest/download/tinymist-installer.sh | sh", "cargo install --git https://github.com/Myriad-Dreamin/tinymist tinymist-cli"]
description = "Typst language server"

[cli.sd]
manager = "cargo"
package = "sd"
install = "cargo install sd"
description = "Search & Displace — intuitive find & replace using regex"

[cli.rg]
manager = "cargo"
package = "ripgrep"
install = "cargo install ripgrep"
description = "ripgrep — fastest recursive line-oriented search tool"

[cli.foxpilot]
manager = "uv"
package = "foxpilot"
install = ["uv tool install /home/eastill/projects/foxpilot", "uv tool install git+https://github.com/EdwardAstill/foxpilot"]
description = "Browser automation CLI — headless Firefox and Zen browser control via Marionette"

[cli.ffmpeg]
manager = "system"
package = "ffmpeg"
install = ["sudo pacman -S ffmpeg", "sudo apt install ffmpeg", "brew install ffmpeg"]
description = "Media transcode / trim / mux — used by youtube skill for WAV/MP3 encoding and clip trimming"

# ── Subagents ────────────────────────────────────────────────────────────────
# Custom subagent definitions shipped with this repo. Installed into
# ~/.claude/agents/<name>.md by `af install`. Invoked via the Agent tool with
# subagent_type: <name>. See docs/reference/skills-vs-subagents.md.

[agents.skill-tester]
source = "agentfiles/agents/skill-tester.md"
